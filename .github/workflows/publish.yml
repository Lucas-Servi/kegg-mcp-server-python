name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Validate tag matches package version
        id: version
        run: |
          PACKAGE_VERSION="$(python - <<'PY'
          from pathlib import Path
          import tomllib

          data = tomllib.loads(Path("pyproject.toml").read_text())
          version_path = Path(data["tool"]["hatch"]["version"]["path"])
          version = next(
              line.split("=", 1)[1].strip().strip('"').strip("'")
              for line in version_path.read_text().splitlines()
              if line.startswith("__version__")
          )
          print(version)
          PY
          )"
          echo "version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ "${GITHUB_REF_NAME#v}" != "${PACKAGE_VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${PACKAGE_VERSION}"
            exit 1
          fi

      - name: Build wheel + sdist
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ steps.version.outputs.version }}
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/kegg-mcp-server/
    permissions:
      id-token: write  # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
